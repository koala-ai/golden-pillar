        let currentFilter = 'all';

        function formatPct(val) {
            if (val === null || val === undefined) return '-';
            const prefix = val > 0 ? '+' : '';
            return prefix + val.toFixed(2) + '%';
        }

        function getPctClass(val) {
            if (val === null || val === undefined) return 'neutral';
            if (val > 0) return 'positive';
            if (val < 0) return 'negative';
            return 'neutral';
        }

        function getTrendBadge(totalChange) {
            if (totalChange === null || totalChange === undefined) return '<span class="badge badge-flat">无数据</span>';
            if (totalChange >= 5) return '<span class="badge badge-strong"> 强势</span>';
            if (totalChange >= 0) return '<span class="badge badge-flat">📈 上涨</span>';
            return '<span class="badge badge-weak">📉 下跌</span>';
        }

        function getTrendBar(totalChange) {
            if (totalChange === null || totalChange === undefined) return '';
            const maxVal = 15;
            const pct = Math.min(Math.abs(totalChange) / maxVal * 100, 100);
            const color = totalChange >= 0 ? '#f85149' : '#3fb950';
            return `<div class="trend-bar"><div class="trend-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
        }

        function renderStats() {
            const total = data.length;
            const rising = data.filter(d => (d.total_change || 0) > 0).length;
            const strong = data.filter(d => (d.total_change || 0) >= 5).length;
            const avgChange = total > 0 ? (data.reduce((s, d) => s + (d.total_change || 0), 0) / total).toFixed(2) : 0;

            document.getElementById('stats').innerHTML = `
                <div class="stat-card info">
                    <div class="value">${total}</div>
                    <div class="label">追踪股票数</div>
                </div>
                <div class="stat-card up">
                    <div class="value">${strong}</div>
                    <div class="label">强势上涨 (>5%)</div>
                </div>
                <div class="stat-card ${rising > total / 2 ? 'up' : 'down'}">
                    <div class="value">${rising}/${total}</div>
                    <div class="label">上涨比例</div>
                </div>
                <div class="stat-card ${parseFloat(avgChange) >= 0 ? 'up' : 'down'}">
                    <div class="value">${parseFloat(avgChange) >= 0 ? '+' : ''}${avgChange}%</div>
                    <div class="label">平均至今涨幅</div>
                </div>
            `;
        }

        function renderTable(filterData) {
            const tbody = document.getElementById('tableBody');
            let filtered = data;

            if (filterData === 'strong') {
                filtered = data.filter(d => (d.total_change || 0) >= 5);
            } else if (filterData === 'rising') {
                filtered = data.filter(d => (d.total_change || 0) > 0 && (d.total_change || 0) < 5);
            } else if (filterData === 'falling') {
                filtered = data.filter(d => (d.total_change || 0) < 0);
            }

            tbody.innerHTML = filtered.map(d => `
                <tr class="${(d.total_change || 0) >= 5 ? 'highlight-row' : ''}">
                    <td class="code" onclick="copyCode('${d.code}')" title="点击复制">${d.code}</td>
                    <td class="name">${d.name}</td>
                    <td class="industry">${d.industry}</td>
                    <td>${d.signal_date}</td>
                    <td class="price">${d.sel_close !== null ? d.sel_close.toFixed(2) : '-'}</td>
                    <td class="${getPctClass(d.sel_change)}">${formatPct(d.sel_change)}</td>
                    <td class="${getPctClass(d.next_day_change)}">${formatPct(d.next_day_change)}</td>
                    <td class="${getPctClass(d.total_change)}" style="font-size:14px;font-weight:700">${formatPct(d.total_change)}</td>
                    <td>${getTrendBadge(d.total_change)}${getTrendBar(d.total_change)}</td>
                    <td class="price">${d.latest_close !== null ? d.latest_close.toFixed(2) : '-'}</td>
                    <td>${d.holding_days}天</td>
                </tr>
            `).join('');
        }

        function copyCode(code) {
            const ta = document.createElement('textarea');
            ta.value = code;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast(code + ' 已复制');
            } catch(e) {
                showToast('复制失败');
            }
            document.body.removeChild(ta);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function filterData(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTable(type);
        }

        // 初始化
        renderStats();
        renderTable('all');
    </script>
    <div class="toast" id="toast"></div>
