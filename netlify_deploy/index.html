                    <td class="${getPctClass(d.next_day_change)}">${formatPct(d.next_day_change)}</td>
                    <td class="${getPctClass(d.total_change)}" style="font-size:14px;font-weight:700">${formatPct(d.total_change)}</td>
                    <td>${getTrendBadge(d.total_change)}${getTrendBar(d.total_change)}</td>
                    <td class="price">${d.latest_close !== null ? d.latest_close.toFixed(2) : '-'}</td>
                    <td>${d.holding_days}天</td>
                </tr>
            `).join('');
        }

        function copyCode(code) {
            const ta = document.createElement('textarea');
            ta.value = code;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast(code + ' 已复制');
            } catch(e) {
                showToast('复制失败');
            }
            document.body.removeChild(ta);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function filterData(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTable(type);
        }

        // 初始化
        renderStats();
        renderTable('all');
    </script>
    <div class="toast" id="toast"></div>
</body>
</html>
